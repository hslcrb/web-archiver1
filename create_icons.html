<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Icon Generator</title>
</head>
<body>
  <h2>Web Archiver Pro - 아이콘 생성기</h2>
  <p>각 캔버스를 우클릭하여 "이미지를 다른 이름으로 저장"을 선택하세요</p>
  
  <div style="margin: 20px;">
    <h3>16x16</h3>
    <canvas id="icon16" width="16" height="16" style="border: 1px solid #ccc; image-rendering: pixelated; width: 160px; height: 160px;"></canvas>
  </div>
  
  <div style="margin: 20px;">
    <h3>48x48</h3>
    <canvas id="icon48" width="48" height="48" style="border: 1px solid #ccc; width: 192px; height: 192px;"></canvas>
  </div>
  
  <div style="margin: 20px;">
    <h3>128x128</h3>
    <canvas id="icon128" width="128" height="128" style="border: 1px solid #ccc; width: 256px; height: 256px;"></canvas>
  </div>

  <button onclick="downloadAll()" style="padding: 10px 20px; font-size: 16px; margin: 20px;">모든 아이콘 다운로드</button>

  <script>
    function drawIcon(canvas) {
      const ctx = canvas.getContext('2d');
      const size = canvas.width;
      
      // 배경 (그라데이션)
      const gradient = ctx.createLinearGradient(0, 0, size, size);
      gradient.addColorStop(0, '#2196F3');
      gradient.addColorStop(1, '#1565C0');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, size, size);
      
      // 보관함 아이콘 그리기
      ctx.fillStyle = 'white';
      
      // 박스
      const padding = size * 0.2;
      const boxWidth = size * 0.6;
      const boxHeight = size * 0.5;
      const boxX = padding;
      const boxY = padding + size * 0.15;
      
      // 박스 테두리
      ctx.strokeStyle = 'white';
      ctx.lineWidth = Math.max(1, size / 16);
      ctx.strokeRect(boxX, boxY, boxWidth, boxHeight);
      
      // 박스 상단 뚜껑
      ctx.fillRect(boxX - size * 0.05, boxY - size * 0.1, boxWidth + size * 0.1, size * 0.1);
      
      // 화살표 (아래로)
      const arrowX = size / 2;
      const arrowY = boxY + boxHeight * 0.3;
      const arrowSize = size * 0.15;
      
      ctx.beginPath();
      ctx.moveTo(arrowX, arrowY + arrowSize);
      ctx.lineTo(arrowX - arrowSize * 0.6, arrowY);
      ctx.lineTo(arrowX + arrowSize * 0.6, arrowY);
      ctx.closePath();
      ctx.fill();
      
      // 화살표 선
      ctx.fillRect(arrowX - size * 0.04, boxY - size * 0.05, size * 0.08, arrowSize);
    }

    // 각 아이콘 그리기
    drawIcon(document.getElementById('icon16'));
    drawIcon(document.getElementById('icon48'));
    drawIcon(document.getElementById('icon128'));

    function downloadCanvas(canvas, filename) {
      canvas.toBlob(function(blob) {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      });
    }

    function downloadAll() {
      setTimeout(() => downloadCanvas(document.getElementById('icon16'), 'icon16.png'), 100);
      setTimeout(() => downloadCanvas(document.getElementById('icon48'), 'icon48.png'), 300);
      setTimeout(() => downloadCanvas(document.getElementById('icon128'), 'icon128.png'), 500);
      alert('3개의 아이콘 파일이 다운로드됩니다. 다운로드된 파일들을 icons/ 폴더에 복사하세요.');
    }
  </script>
</body>
</html>
