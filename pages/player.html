<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>WACZ Player - Web Archiver Pro</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; 
      background: #1a1a1a; 
      color: #fff;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    .header {
      background: #2d2d2d;
      padding: 15px 20px;
      border-bottom: 2px solid #3d3d3d;
      display: flex;
      align-items: center;
      gap: 15px;
    }
    
    .header h1 {
      font-size: 18px;
      color: #4CAF50;
      margin-right: auto;
    }
    
    .load-file-btn {
      padding: 8px 16px;
      background: #2196F3;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
    }
    
    .load-file-btn:hover { background: #1976D2; }
    
    .controls {
      background: #252525;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid #3d3d3d;
    }
    
    .url-bar {
      flex: 1;
      padding: 8px 12px;
      background: #1a1a1a;
      border: 1px solid #444;
      border-radius: 4px;
      color: #fff;
      font-size: 14px;
    }
    
    .nav-btn {
      padding: 8px 12px;
      background: #3d3d3d;
      border: none;
      border-radius: 4px;
      color: #fff;
      cursor: pointer;
      font-weight: 600;
    }
    
    .nav-btn:hover { background: #4d4d4d; }
    .nav-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    
    .sidebar {
      position: fixed;
      left: 0;
      top: 112px;
      bottom: 0;
      width: 300px;
      background: #252525;
      border-right: 1px solid #3d3d3d;
      overflow-y: auto;
      display: none;
    }
    
    .sidebar.active { display: block; }
    
    .sidebar-header {
      padding: 15px;
      background: #2d2d2d;
      font-weight: 600;
      border-bottom: 1px solid #3d3d3d;
    }
    
    .page-list {
      list-style: none;
    }
    
    .page-item {
      padding: 12px 15px;
      border-bottom: 1px solid #2d2d2d;
      cursor: pointer;
      transition: background 0.2s;
    }
    
    .page-item:hover { background: #2d2d2d; }
    .page-item.active { background: #1976D2; }
    
    .page-url {
      font-size: 13px;
      color: #4CAF50;
      word-break: break-all;
      margin-bottom: 4px;
    }
    
    .page-time {
      font-size: 11px;
      color: #888;
    }
    
    .content-area {
      flex: 1;
      display: flex;
      position: relative;
      overflow: hidden;
    }
    
    .content-area.with-sidebar {
      margin-left: 300px;
    }
    
    .viewer-frame {
      width: 100%;
      height: 100%;
      border: none;
      background: white;
    }
    
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #666;
    }
    
    .empty-state-icon {
      font-size: 64px;
      margin-bottom: 20px;
    }
    
    .empty-state h2 {
      font-size: 24px;
      margin-bottom: 10px;
    }
    
    .empty-state p {
      font-size: 14px;
      color: #888;
    }
    
    .status-bar {
      background: #2d2d2d;
      padding: 8px 20px;
      font-size: 12px;
      color: #888;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .loading {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.9);
      padding: 30px 40px;
      border-radius: 8px;
      z-index: 9999;
    }
    
    .loading.active { display: block; }
    
    .spinner {
      border: 3px solid #3d3d3d;
      border-top: 3px solid #4CAF50;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 15px;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    input[type="file"] { display: none; }
  </style>
</head>
<body>
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div>파일 로딩 중...</div>
  </div>

  <div class="header">
    <h1>📦 WACZ Player</h1>
    <button class="load-file-btn" onclick="document.getElementById('fileInput').click()">
      WACZ 파일 열기
    </button>
    <input type="file" id="fileInput" accept=".wacz,.zip">
  </div>

  <div class="controls">
    <button class="nav-btn" id="backBtn" disabled>◀ 뒤로</button>
    <button class="nav-btn" id="forwardBtn" disabled>앞으로 ▶</button>
    <button class="nav-btn" id="toggleSidebar">📑 페이지 목록</button>
    <input type="text" class="url-bar" id="urlBar" placeholder="URL을 입력하세요..." readonly>
    <button class="nav-btn" id="goBtn">이동</button>
  </div>

  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">저장된 페이지 목록</div>
    <ul class="page-list" id="pageList"></ul>
  </div>

  <div class="content-area" id="contentArea">
    <div class="empty-state" id="emptyState">
      <div class="empty-state-icon">📂</div>
      <h2>WACZ 아카이브를 열어보세요</h2>
      <p>상단의 "WACZ 파일 열기" 버튼을 클릭하여 시작하세요</p>
    </div>
    <iframe class="viewer-frame" id="viewerFrame" style="display: none;"></iframe>
  </div>

  <div class="status-bar">
    <span id="statusText">준비됨</span>
    <span id="statsText">-</span>
  </div>

  <script src="../libs/jszip.min.js"></script>
  <script type="module" src="player.js"></script>
</body>
</html>
