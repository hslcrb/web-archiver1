<!DOCTYPE html>
<html>
<head>
  <style>
    #archiver-float {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(0,0,0,0.8);
      color: white;
      padding: 10px;
      border-radius: 8px;
      z-index: 999999;
      font-family: sans-serif;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
      pointer-events: none;
    }
    .rec-dot {
      width: 10px;
      height: 10px;
      background: red;
      border-radius: 50%;
      animation: blink 1s infinite;
    }
    @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
  </style>
</head>
<body>
  <div id="archiver-float">
    <div class="rec-dot"></div>
    <span>REC</span>
    <span id="req-count">0</span>
  </div>
</body>
</html>
