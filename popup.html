<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 250px; font-family: sans-serif; padding: 15px; }
    .status { margin-bottom: 15px; font-weight: bold; }
    .btn { width: 100%; padding: 10px; margin-bottom: 5px; cursor: pointer; border: none; border-radius: 4px; }
    #startBtn { background: #4CAF50; color: white; }
    #stopBtn { background: #f44336; color: white; }
    #exportBtn { background: #2196F3; color: white; }
    .hidden { display: none; }
    .stats { font-size: 12px; color: #666; }
  </style>
</head>
<body>
  <h3>Web Archiver Pro</h3>
  <div class="status">상태: <span id="statusText">대기 중</span></div>
  <div class="stats" id="statsText">요청: 0개</div>
  <hr>
  <button id="startBtn" class="btn">녹화 시작</button>
  <button id="stopBtn" class="btn hidden">녹화 중지</button>
  <button id="exportBtn" class="btn hidden">데이터 내보내기</button>
  <script src="popup.js"></script>
</body>
</html>
